<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Summarizer</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z" fill="url(#paint0_linear_1_2)"/>
                    <defs>
                        <linearGradient id="paint0_linear_1_2" x1="2" y1="2" x2="22" y2="21.02" gradientUnits="userSpaceOnUse">
                            <stop stop-color="#4F46E5"/>
                            <stop offset="1" stop-color="#EC4899"/>
                        </linearGradient>
                    </defs>
                </svg>
                <h1>Gemini Summarizer</h1>
            </div>
            <p class="subtitle">Simplify the web with AI</p>
        </header>

        <main>
            <div class="api-key-container" style="margin-bottom: 15px;">
                <label for="api-key" style="font-size: 12px; color: #a1a1aa; display: block; margin-bottom: 5px;">Gemini API Key</label>
                <input type="password" id="api-key" placeholder="Enter your key here" style="width: 100%; padding: 8px; border-radius: 6px; border: 1px solid #3f3f46; background: #27272a; color: #fff; box-sizing: border-box; margin-bottom: 5px;">
                <p id="api-key-status" style="font-size: 11px; color: #10b981; margin: 0; min-height: 15px;"></p>
            </div>
            <button id="summarize-all" class="btn primary">
                <span class="icon">✨</span>
                Summarize Entire Page
            </button>
            <button id="summarize-select" class="btn secondary">
                <span class="icon">🎯</span>
                Select Specific Parts
            </button>
        </main>
        
        <footer>
            <p id="status-msg"></p>
        </footer>
    </div>
    <script src="popup.js"></script>
</body>
</html>
